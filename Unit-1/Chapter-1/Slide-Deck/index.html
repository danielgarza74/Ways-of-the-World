                </span>

            </div>

            <!-- Right Section: Controls -->

                        </svg>
                    </button>
                    <button id="next-btn" class="p-2 rounded bg-slate-800 border border-slate-600 hover:bg-slate-700 text-white transition-colors" aria-label="Next Slide">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                    </svg>

    <!-- Application Logic -->
    <script>
        // State
        let currentSlideIndex = 0;
        const totalSlides = 20;

        // Map Slide Numbers (1-indexed) to Cue Questions extracted from Guided Notes
        const cueQuestions = {
            4: "How did the development of symbolic language enable Homo sapiens to adapt to every environmental niche on Earth?",
            5: "What evidence from Eurasia suggests that Paleolithic humans possessed a rich spiritual and artistic life?",
            6: "How did the Dreamtime worldview and continent-wide exchange networks demonstrate the complex social organization of Aboriginal Australians?",
            7: "How did the Austronesian migrations differ from the earlier migrations to the Americas in terms of transportation and cultural impact?",
            8: "Why is Paleolithic society sometimes referred to as 'the original affluent society'?",
            9: "In what ways did Paleolithic peoples use shamans, cave art, and Venus figurines to interact with the unseen world?",
            10: "How does the site of Göbekli Tepe challenge traditional assumptions about the relationship between settled communities and agriculture?",
            11: "What environmental and demographic pressures pushed human societies to transition from food collecting to food production?",
            12: "How did the east-west geographic orientation of Eurasia facilitate the rapid spread of agriculture compared to other regions?",
            13: "What environmental challenges made the domestication of crops and animals uniquely difficult in the Americas?",
            14: "Compare and contrast the spread of agriculture through diffusion (e.g., Indo-European) with its spread through migration (e.g., Bantu).",
            15: "What does Ishi's story reveal about the broader global impact of expanding agricultural societies on foraging peoples?",
            16: "In what ways did the Agricultural Revolution lead to a deterioration in human health and an increase in social inequality?",
            17: "How did the shift to agriculture give rise to pastoralism, village life, and the first hereditary chiefdoms?",
            18: "What was the Secondary Products Revolution, and how did it multiply agricultural productivity?",
            19: "Considering both the gains and losses, why might some historians view the Agricultural Revolution as a 'great bargain' rather than simple progress?"
        };

        // DOM Elements
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const slideCounter = document.getElementById('slide-counter');
        const progressBar = document.getElementById('progress-bar');
        const eqContainer = document.getElementById('eq-container');
        const eqText = document.getElementById('eq-text');
        const appContainer = document.getElementById('presentation-app');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        // Core UI Update Function
        function updateUI() {
            // Update slide visibility
            slides.forEach((slide, index) => {
                if (index === currentSlideIndex) {
                    slide.classList.remove('hidden');
                    slide.classList.add('flex');
                } else {
                    slide.classList.remove('flex');
                    slide.classList.add('hidden');
                }
            });

            // Update Counter Text (leading zeros)
            const currentStr = String(currentSlideIndex + 1).padStart(2, '0');
            const totalStr = String(totalSlides).padStart(2, '0');
            slideCounter.textContent = `${currentStr} / ${totalStr}`;

            // Update Progress Bar
            const progress = (currentSlideIndex / (totalSlides - 1)) * 100;
            progressBar.style.width = `${progress}%`;

            // Evaluate Cue Question Visibility
            const currentSlideNumber = currentSlideIndex + 1;
            const question = cueQuestions[currentSlideNumber];
            
            if (question) {
                eqText.textContent = question;
                eqContainer.classList.remove('opacity-0', 'invisible');
            } else {
                eqContainer.classList.add('opacity-0', 'invisible');
            }
        }

        // Navigation Controllers
        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateUI();
            }
        }

        // Fullscreen Controller
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                appContainer.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Event Listeners
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);
        fullscreenBtn.addEventListener('click', toggleFullScreen);

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'Space' || e.key === ' ') {
                e.preventDefault(); // Prevent page scroll on Spacebar
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });

        // Toggle Fullscreen Icon Based on State
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>`;
            } else {
                fullscreenBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                    </svg>`;
            }
        });

        // Initialize application state on load
        updateUI();
    </script>
