    <!-- Consolidated Bottom Bar: Redesigned for absolute wrapping with no truncation -->
    <div id="bottom-bar" class="flex-shrink-0 bg-slate-900 border-t border-yellow-600 shadow-[0_-4px_20px_rgba(0,0,0,0.5)] z-20 relative">
        
        <!-- Progress Bar -->
        <div class="absolute top-0 left-0 w-full h-1 bg-slate-800">
            <div id="progress-bar" class="h-full bg-yellow-500 transition-all duration-300 ease-out" style="width: 0%;"></div>
        </div>
        
        <!-- Container allowing flexible height -->
        <div class="flex items-center justify-between px-4 py-4 min-h-[5rem] h-auto gap-4">
            
            <!-- Left Section: Title -->
            <div class="hidden lg:block w-1/4 font-semibold text-slate-300 text-sm md:text-base">
                Lecture 2: First Civilizations
            </div>

            <!-- Center Section: Cue Question (Fully Wrappable) -->
            <div id="eq-container" class="flex-1 flex flex-col sm:flex-row items-start sm:items-center justify-center gap-3 opacity-0 invisible">
                <span class="bg-yellow-600 text-yellow-50 text-xs font-bold px-2 py-1 rounded uppercase tracking-wider flex-shrink-0">
                    Cue Question
                </span>
                <p id="eq-text" class="text-sm md:text-base text-yellow-100 italic text-left leading-relaxed break-words whitespace-normal max-w-3xl">
                    <!-- Dynamic text will be injected here and forced to wrap entirely -->
                </p>
            </div>

            <!-- Right Section: Controls -->
            <div class="flex items-center justify-end gap-3 w-auto lg:w-1/4 flex-shrink-0">
                <div id="slide-counter" class="text-slate-400 font-mono text-sm tracking-widest min-w-[60px] text-right">
                    01 / 14
                </div>
                
                <div class="flex items-center gap-1">
                    <button onclick="prevSlide()" class="p-2 bg-slate-800 border border-slate-600 rounded hover:bg-slate-700 text-white transition-colors" aria-label="Previous Slide">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <button onclick="nextSlide()" class="p-2 bg-slate-800 border border-slate-600 rounded hover:bg-slate-700 text-white transition-colors" aria-label="Next Slide">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
                
                <div class="w-px h-6 bg-slate-700 mx-1"></div>
                
                <button id="fullscreen-btn" onclick="toggleFullScreen()" class="p-2 bg-slate-800 border border-slate-600 rounded hover:bg-slate-700 text-yellow-400 transition-colors" aria-label="Toggle Fullscreen">
                    <svg id="fullscreen-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                    </svg>
                </button>
            </div>
            
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        
        // Map 1-indexed slide numbers to their respective Cue Questions from the Guided Notes
        const cueQuestions = {
            4: "Why do historians view the term \"civilization\" as an ambiguous concept representing both achievement and a burden?",
            5: "What does the independent emergence of similar civilizational features across multiple distinct regions suggest?",
            6: "How did an agricultural surplus act as the foundation for complex society, specialized labor, and inequality?",
            7: "How did cities reshape social bonds compared to earlier, kinship-based village life?",
            8: "In what ways was social hierarchy made visible and enforced in early civilizations?",
            9: "How do historians explain the origins of patriarchy, and how did its practice vary between Mesopotamia and Egypt?",
            10: "How did early states combine coercion, religious legitimacy, and practical utility to maintain authority over populations?",
            11: "How did writing transition from a practical tool for accounting into an instrument for state power, literature, and memory?",
            12: "How did the contrasting environments of the Tigris-Euphrates and the Nile shape the respective worldviews and political structures of Mesopotamia and Egypt?",
            13: "In what ways does the exchange of ideas and technology demonstrate that early civilizations were interconnected?",
            14: "Based on the achievements and costs discussed, would you characterize the rise of civilization primarily as progress or a setback?"
        };

        function updateUI() {
            // Update Slide Visibility
            slides.forEach((slide, index) => {
                if (index === currentSlideIndex) {
                    slide.classList.remove('hidden');
                    slide.classList.add('flex');
                } else {
                    slide.classList.remove('flex');
                    slide.classList.add('hidden');
                }
            });

            // Update Counter (formatting with leading zeros)
            const displayNum = String(currentSlideIndex + 1).padStart(2, '0');
            const displayTotal = String(totalSlides).padStart(2, '0');
            document.getElementById('slide-counter').textContent = `${displayNum} / ${displayTotal}`;

            // Update Progress Bar
            const progressPercentage = ((currentSlideIndex) / (totalSlides - 1)) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercentage}%`;

            // Update Cue Question
            const currentSlideNumber = currentSlideIndex + 1;
            const eqContainer = document.getElementById('eq-container');
            const eqText = document.getElementById('eq-text');
            
            if (cueQuestions[currentSlideNumber]) {
                eqText.textContent = cueQuestions[currentSlideNumber];
                eqContainer.classList.remove('opacity-0', 'invisible');
            } else {
                eqContainer.classList.add('opacity-0', 'invisible');
            }
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateUI();
            }
        }

        function toggleFullScreen() {
            const app = document.getElementById('presentation-app');
            if (!document.fullscreenElement) {
                if (app.requestFullscreen) {
                    app.requestFullscreen();
                } else if (app.webkitRequestFullscreen) { /* Safari */
                    app.webkitRequestFullscreen();
                } else if (app.msRequestFullscreen) { /* IE11 */
                    app.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        }

        // Fullscreen Change Listener (update icon)
        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fullscreen-icon');
            if (document.fullscreenElement) {
                // Change to exit fullscreen icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />'; // Simple X/minimize conceptual substitute
            } else {
                // Change back to expand icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />';
            }
        });

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === ' ') {
                e.preventDefault(); // Prevent default page down scrolling
                nextSlide();
            }
        });

        // Initialize UI on load
        window.addEventListener('DOMContentLoaded', updateUI);
    </script>
