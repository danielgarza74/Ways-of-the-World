    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        
        // Map 1-based slide numbers to Cue Questions
        const cueQuestions = {
            4: "What tumultuous social changes pushed thinkers across Eurasia to develop new philosophical and religious traditions?",
            5: "How did Legalism address the crisis of the Warring States period, and what was its view of human nature?",
            6: "In contrast to Legalism, how did Confucius believe social harmony could be achieved?",
            7: "How did Daoism view the efforts of Confucianism to reform society, and what was its proposed solution?",
            8: "How do Legalism, Confucianism, and Daoism differ in their proposed solutions to social disorder?",
            9: "How did the Upanishads challenge the emphasis on rituals found in the Vedas?",
            10: "How does the concept of Nirvana in Buddhism compare to Moksha in Hinduism?",
            11: "What is the primary difference between Theravada and Mahayana Buddhism regarding the path to salvation?",
            12: "What does the existence and curriculum of Nalanda University reveal about Buddhism's impact on learning and culture?",
            13: "How did the Bhagavad Gita and the Bhakti movement allow Hinduism to absorb and respond to the challenge of Buddhism?",
            14: "What revolutionary ideas introduced by Zoroastrianism influenced later monotheistic religions?",
            15: "How did the Hebrew prophets transform the concept of Yahweh into an \"Ethical Monotheism\"?",
            16: "How did Greek intellectuals like Socrates, Plato, and Aristotle attempt to understand the world differently than earlier mythologies?",
            17: "In what ways was Jesus's message considered dangerous to both the Jewish establishment and the Roman imperial order?",
            18: "What role did figures like Saint Paul and the martyr Perpetua play in the spread and solidifying of early Christianity?",
            19: "What were the main causes of the eventual Great Split between the Latin West and the Greek East in the Christian church?",
            20: "Which two traditions emerged during this era as the first truly universal religions, and what made them \"universal\"?",
            21: "In looking back at the major traditions of this era, how do the secular worldviews compare to the religious worldviews in addressing human needs?"
        };

        function updateUI() {
            // Update Slides Visibility
            slides.forEach((slide, index) => {
                if (index === currentSlideIndex) {
                    slide.classList.remove('hidden');
                    slide.classList.add('flex');
                } else {
                    slide.classList.add('hidden');
                    slide.classList.remove('flex');
                }
            });

            // Update Slide Counter
            const displaySlideNum = (currentSlideIndex + 1).toString().padStart(2, '0');
            const displayTotal = totalSlides.toString().padStart(2, '0');
            document.getElementById('slide-counter').textContent = `${displaySlideNum} / ${displayTotal}`;

            // Update Progress Bar
            const progressPercent = ((currentSlideIndex + 1) / totalSlides) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            // Update Cue Question
            const eqContainer = document.getElementById('eq-container');
            const eqText = document.getElementById('eq-text');
            const slideNumber = currentSlideIndex + 1;

            if (cueQuestions[slideNumber]) {
                eqText.textContent = cueQuestions[slideNumber];
                eqContainer.classList.remove('opacity-0', 'invisible');
            } else {
                eqContainer.classList.add('opacity-0', 'invisible');
                // Optional: clear text after fade out to keep DOM clean
                setTimeout(() => {
                    if(eqContainer.classList.contains('opacity-0')) eqText.textContent = '';
                }, 300);
            }
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateUI();
            }
        }

        function toggleFullScreen() {
            const app = document.getElementById('presentation-app');
            if (!document.fullscreenElement) {
                app.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Handle Fullscreen UI updates
        document.addEventListener('fullscreenchange', () => {
            const expandIcon = document.getElementById('icon-expand');
            const shrinkIcon = document.getElementById('icon-shrink');
            
            if (document.fullscreenElement) {
                expandIcon.classList.add('hidden');
                expandIcon.classList.remove('block');
                shrinkIcon.classList.remove('hidden');
                shrinkIcon.classList.add('block');
            } else {
                expandIcon.classList.remove('hidden');
                expandIcon.classList.add('block');
                shrinkIcon.classList.add('hidden');
                shrinkIcon.classList.remove('block');
            }
        });

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault(); // Prevent page scroll
                nextSlide();
            }
        });

        // Initialize UI on load
        window.onload = updateUI;
    </script>
