    <script>
        const totalSlides = 22;
        let currentSlideIndex = 0; // 0-based index

        // Mapping 1-based slide numbers to Cue Questions from the Guided Notes
        const cueQuestions = {
            4: "How did the Chinese state act as the primary organizing force in classical Chinese society?",
            5: "How did the examination system theoretically provide social mobility, and how did practical reality differ?",
            6: "Why did Wang Mang's radical land reform fail against the entrenched landlord elite?",
            7: "What economic and environmental factors made peasant life constantly precarious during the Han era?",
            8: "How did Ge Hong's life reflect the tension between fulfilling Confucian duty and seeking Daoist retreat?",
            9: "How did environmental disasters and Daoist ideals spark a rebellion that shattered Han authority?",
            10: "Why were wealthy merchants placed at the absolute bottom of China's formal social hierarchy?",
            11: "How did the Purusha origin story justify the varna system as a divine, eternal cosmic order?",
            12: "How did Jatis govern the daily realities of occupational identity, marriage, and social boundaries in India?",
            13: "In what ways did the concepts of karma and dharma make social inequality seem both earned and spiritually necessary?",
            14: "How did India's caste system provide social cohesion without the need for a strong, centralized political state?",
            15: "What fundamental characteristics defined the experience of slavery across all classical civilizations, despite regional differences?",
            16: "From what sources did the Roman Empire primarily acquire its massive enslaved population?",
            17: "What does the brutal Roman suppression of Spartacus's rebellion reveal about the empire's reliance on enslaved labor?",
            18: "How did the intensity and justification of patriarchy manifest differently across China, India, and the Greco-Roman world?",
            19: "In what ways did female subordination fluctuate from the strict Confucian Han dynasty through the reign of Empress Wu?",
            20: "Why did the militaristic society of Sparta ironically offer women more public freedom than the democratic society of Athens?",
            21: "How did the rationalizations for elite privilege differ fundamentally across the three major classical regions?",
            22: "Why did profound social hierarchies, like caste and patriarchy, consistently outlast the political empires that helped enforce them?"
        };

        function updateUI() {
            // Update slide visibility
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, index) => {
                if (index === currentSlideIndex) {
                    slide.classList.remove('hidden');
                    slide.classList.add('flex');
                } else {
                    slide.classList.remove('flex');
                    slide.classList.add('hidden');
                }
            });

            // Update slide counter
            const slideNumber = currentSlideIndex + 1;
            const counterStr = String(slideNumber).padStart(2, '0') + ' / ' + totalSlides;
            document.getElementById('slide-counter').textContent = counterStr;

            // Update progress bar
            const progressPct = (slideNumber / totalSlides) * 100;
            document.getElementById('progress-bar').style.width = progressPct + '%';

            // Update dynamic Cue Question
            const eqContainer = document.getElementById('eq-container');
            const eqText = document.getElementById('eq-text');
            const question = cueQuestions[slideNumber];

            if (question) {
                eqText.textContent = question;
                eqContainer.classList.remove('opacity-0', 'invisible');
            } else {
                eqContainer.classList.add('opacity-0', 'invisible');
            }
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateUI();
            }
        }

        function toggleFullScreen() {
            const app = document.getElementById('presentation-app');
            if (!document.fullscreenElement) {
                app.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Keyboard Event Listeners for Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (e.key === ' ') e.preventDefault(); // Prevent page scroll on space
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // Toggle Full Screen Button Icon
        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fs-btn');
            if (document.fullscreenElement) {
                // Minimize Icon
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 13.5V18M9 18H4.5M9 18l-4.5-4.5M15 10.5V6M15 6h4.5M15 6l4.5 4.5M15 18h4.5M19.5 18v-4.5M19.5 18l-4.5-4.5M9 6H4.5M4.5 6v4.5M4.5 6l4.5 4.5" /></svg>`;
            } else {
                // Expand Icon
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" /></svg>`;
            }
        });

        // Initialize UI
        updateUI();
    </script>
