    <!-- Consolidated Bottom Bar -->

        <!-- Controls Container -->

            </div>

            <!-- Center Section: Cue Question -->
            <div id="eq-container" class="flex-[2] flex items-center justify-center gap-3 opacity-0 invisible mx-4">
                <span class="bg-yellow-600 text-yellow-50 text-xs font-bold px-2 py-1 rounded uppercase tracking-wider whitespace-nowrap shadow shrink-0">
                    Cue Question
                </span>

            </div>

            <!-- Right Section: Controls -->

                <div id="slide-counter" class="text-slate-400 font-mono text-sm tracking-wider w-16 text-right">
                    01 / 15
                </div>
                
                <div class="flex gap-2">
                    <button onclick="prevSlide()" class="p-2 rounded bg-slate-800 border border-slate-600 hover:bg-slate-700 hover:border-slate-500 text-white transition-colors" aria-label="Previous Slide">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                        </svg>
                    </button>
                    <button onclick="nextSlide()" class="p-2 rounded bg-slate-800 border border-slate-600 hover:bg-slate-700 hover:border-slate-500 text-white transition-colors" aria-label="Next Slide">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                        </svg>
                    </button>
                </div>

                <div class="h-6 w-px bg-slate-700 mx-1"></div>

                <button id="fs-btn" onclick="toggleFullScreen()" class="p-2 rounded bg-slate-800 border border-slate-600 hover:bg-slate-700 hover:border-slate-500 text-yellow-400 transition-colors" title="Toggle Full Screen">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const totalSlides = 15;
        let currentSlideIndex = 0; // 0-based index

        // Mapping 1-based slide numbers to Cue Questions from the Guided Notes
        const cueQuestions = {
            4: "How did the environmental and demographic realities of Africa, the Americas, and Oceania compare to Eurasia during the second-wave era?",
            5: "In what specific ways did the absence of certain domesticable animals, iron metallurgy, and widespread writing systems shape the trajectories of societies outside Eurasia?",
            6: "What role did iron production and ecological changes play in both the rise and the eventual collapse of the Kingdom of Meroë?",
            7: "How did plow agriculture, the port of Adulis, and the adoption of Christianity contribute to the power and enduring legacy of Axum?",
            8: "How does Jenne-jeno challenge the traditional historical assumption that complex urban centers require coercive, centralized state structures?",
            9: "What combination of ecological and political factors led to the rapid collapse of the southern Maya city-states in the ninth century?",
            10: "How did Teotihuacán differ from the Maya in terms of urban scale, governance style, and ethnic diversity?",
            11: "How did the sequential rise of Chavín, Moche, Wari, and Tiwanaku represent a continuous thread of cultural and political development in the Andes despite differing environments and systems of rule?",
            12: "How did the slow migration of Bantu-speaking peoples fundamentally transform the demographic, economic, and social landscape of sub-Saharan Africa?",
            13: "Compare and contrast the environmental adaptations and architectural achievements of the Ancestral Pueblo in the arid Southwest with those of the Mound Builders in the Eastern Woodlands.",
            14: "How did concepts like mana and tapu organize Pacific societies, and what were the ecological consequences of human settlement across the islands?",
            15: "Based on these alternative paths, why is it inaccurate to view civilizations outside Eurasia as merely 'less developed' versions of the Eurasian model?"
        };

        function updateUI() {
            // Update slide visibility
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, index) => {
                if (index === currentSlideIndex) {
                    slide.classList.remove('hidden');
                    slide.classList.add('flex');
                } else {
                    slide.classList.remove('flex');
                    slide.classList.add('hidden');
                }
            });

            // Update slide counter
            const slideNumber = currentSlideIndex + 1;
            const counterStr = String(slideNumber).padStart(2, '0') + ' / ' + totalSlides;
            document.getElementById('slide-counter').textContent = counterStr;

            // Update progress bar
            const progressPct = (slideNumber / totalSlides) * 100;
            document.getElementById('progress-bar').style.width = progressPct + '%';

            // Update dynamic Cue Question
            const eqContainer = document.getElementById('eq-container');
            const eqText = document.getElementById('eq-text');
            const question = cueQuestions[slideNumber];

            if (question) {
                eqText.textContent = question;
                eqContainer.classList.remove('opacity-0', 'invisible');
            } else {
                eqContainer.classList.add('opacity-0', 'invisible');
            }
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateUI();
            }
        }

        function toggleFullScreen() {
            const app = document.getElementById('presentation-app');
            if (!document.fullscreenElement) {
                app.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Keyboard Event Listeners for Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (e.key === ' ') e.preventDefault(); // Prevent page scroll on space
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // Toggle Full Screen Button Icon
        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fs-btn');
            if (document.fullscreenElement) {
                // Minimize Icon
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 13.5V18M9 18H4.5M9 18l-4.5-4.5M15 10.5V6M15 6h4.5M15 6l4.5 4.5M15 18h4.5M19.5 18v-4.5M19.5 18l-4.5-4.5M9 6H4.5M4.5 6v4.5M4.5 6l4.5 4.5" /></svg>`;
            } else {
                // Expand Icon
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" /></svg>`;
            }
        });

        // Initialize UI
        updateUI();
    </script>
